# Alembic configuration for Saisei's application Postgres schema.
#
# Scope: Alembic owns the APPLICATION tables only -- the immutable audit ledger
# (saisei_audit_log), the agent-trajectory store (saisei_trajectory), the
# Portfolio watchlist (saisei_portfolio_watchlist), and the pgvector long-term
# memory table (saisei_keikakusho_memory). The LangGraph checkpointer tables are
# created and owned by PostgresSaver.setup() and are deliberately NOT managed
# here (Alembic must not fight LangGraph's own schema).
#
# The database URL is NOT stored here. migrations/env.py resolves it at runtime
# from Settings.postgres_dsn through the secret-provider seam, so a deployment
# points migrations at the same DSN (or a @vault:/@file:/@env: reference) as the
# rest of the app, and no credential ever lives in this file.

[alembic]
script_location = migrations
prepend_sys_path = .
# Use a path separator that works cross-platform for version locations.
path_separator = os
# Timestamped, slugged revision filenames for a readable, ordered history.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

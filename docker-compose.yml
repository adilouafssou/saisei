services:
  nginx:
    image: nginx:alpine
    ports:
      - "3000:3000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  app:
    build: .
    env_file: .env
    environment:
      # Selects `reflex run --env <REFLEX_ENV>` via the image entrypoint.
      # Defaults to prod; `make run-dev` overrides this to dev.
      - REFLEX_ENV=${REFLEX_ENV:-prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    # pgvector/pgvector is the official Postgres image with the `vector`
    # extension pre-built. It is a drop-in replacement for postgres:16-alpine
    # and backs BOTH the LangGraph checkpointer AND the long-term agent memory
    # (the pgvector store), so no separate vector database is needed.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: saisei
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saisei}
      POSTGRES_DB: saisei
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Enable the `vector` extension on first boot (idempotent).
      - ./scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saisei"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
